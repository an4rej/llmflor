# Автодеплой на Timeweb при push в main (FTP).
# Секреты: Settings → Secrets and variables → Actions → Repository secrets
#
# Обязательные:
#   FTP_SERVER      — IP или FTP-хост из панели Timeweb (например 92.53.xx.xx)
#   FTP_USERNAME    — логин FTP (часто совпадает с логином хостинга)
#   FTP_PASSWORD    — пароль FTP
#   FTP_SERVER_DIR  — каталог на сервере ОТНОСИТЕЛЬНО корня FTP, со слэшем в конце.
#                     Часто: i.solflo.ru/public_html/  (см. путь в файловом менеджере / FileZilla)
#
# Если коннект падает по TLS — в шаге Deploy раскомментируйте protocol и security.

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Проверка секретов
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ] && missing="${missing} FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="${missing} FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="${missing} FTP_PASSWORD"
          [ -z "$FTP_SERVER_DIR" ] && missing="${missing} FTP_SERVER_DIR"
          if [ -n "$missing" ]; then
            echo "::error::В GitHub не заданы секреты:$missing. Репозиторий → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy по FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Timeweb часто даёт обычный FTP:21. Если нужен FTPS — раскомментируйте две строки ниже.
          # protocol: ftps
          # security: loose
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
