# Автодеплой на Timeweb при push в main (FTP через GitHub Actions).
#
# Секреты (Settings → Secrets and variables → Actions → Secrets):
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR
#   FTP_SERVER_DIR — путь от корня FTP со слэшем в конце, например: i.solflo.ru/public_html/
#
# Переменные (та же страница → вкладка Variables), необязательно:
#   FTP_DEPLOY_PROTOCOL — пусто или ftp → обычный FTP; значение ftps → FTPS + loose TLS
#   FTP_PORT            — порт (по умолчанию 21, если переменная не задана)

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-timeweb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Проверка секретов
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ] && missing="${missing} FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="${missing} FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="${missing} FTP_PASSWORD"
          [ -z "$FTP_SERVER_DIR" ] && missing="${missing} FTP_SERVER_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Добавьте секреты Actions:$missing"
            exit 1
          fi
          case "$FTP_SERVER_DIR" in
            */) ;;
            *)
              echo "::error::FTP_SERVER_DIR должен заканчиваться на /"
              exit 1
              ;;
          esac

      - name: Deploy по FTP
        if: ${{ vars.FTP_DEPLOY_PROTOCOL != 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          port: ${{ vars.FTP_PORT || '21' }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**

      - name: Deploy по FTPS
        if: ${{ vars.FTP_DEPLOY_PROTOCOL == 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          security: loose
          port: ${{ vars.FTP_PORT || '21' }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
