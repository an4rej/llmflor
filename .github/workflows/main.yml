# Автодеплой на Timeweb при push в main (FTP через GitHub Actions).
#
# Секреты → Actions → Secrets:
#   FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR
#   FTP_SERVER_DIR — путь ОТ КОРНЯ FTP при входе в FileZilla, со слэшем в конце.
#   Частая ошибка: заливка в public_html/ у корня, тогда сайт лежит в i.solflo.ru/public_html/
#
# Variables: FTP_DEPLOY_PROTOCOL=ftps, FTP_PORT
#
# Если в Actions «успех», а на сайте старые файлы:
#   1) Проверьте FTP_SERVER_DIR = тот же каталог, откуда открывается сайт в файловом менеджере Timeweb.
#   2) Запустите workflow вручную с галкой «Полная перезаливка» (очистит server-dir и зальёт заново).
#   3) Либо по FTP удалите на сервере файл .ftp-deploy-sync-state.json (если остался от старых тестов).

name: Deploy to Timeweb

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_reset:
        description: Полная перезаливка (удаляет содержимое server-dir, затем заливает репозиторий)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-timeweb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Что уходит на сервер (проверка)
        run: |
          echo "Корень репозитория:"
          ls -la
          if [ -f index.html ]; then
            echo "index.html первые байты:"
            head -c 200 index.html | wc -c
            echo "(в логе сравните с тем, что открываете на хостинге по FTP)"
          fi

      - name: Проверка секретов
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ] && missing="${missing} FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="${missing} FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="${missing} FTP_PASSWORD"
          [ -z "$FTP_SERVER_DIR" ] && missing="${missing} FTP_SERVER_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Добавьте секреты Actions:$missing"
            exit 1
          fi
          case "$FTP_SERVER_DIR" in
            */) ;;
            *)
              echo "::error::FTP_SERVER_DIR должен заканчиваться на /"
              exit 1
              ;;
          esac

      # ftp-deploy открывает state-name локально; каталог должен существовать
      - name: Каталог state для FTP-Deploy
        run: mkdir -p .deploy-state

      - name: Deploy по FTP
        if: ${{ vars.FTP_DEPLOY_PROTOCOL != 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          port: ${{ vars.FTP_PORT || '21' }}
          # Отдельный state-файл — после смены с дефолтного будет полная пересинхронизация хешей
          state-name: .deploy-state/llmflor-ftp-deploy.json
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reset == true }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**

      - name: Deploy по FTPS
        if: ${{ vars.FTP_DEPLOY_PROTOCOL == 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          security: loose
          port: ${{ vars.FTP_PORT || '21' }}
          state-name: .deploy-state/llmflor-ftp-deploy.json
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reset == true }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
