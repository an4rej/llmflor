# Деплой на Timeweb по FTP из GitHub Actions.
#
# Ветки:
#   main    → секрет FTP_SERVER_DIR   (ваш текущий «не прод» или как настроите)
#   develop → секрет FTP_SERVER_DIR_BRANCH (отдельная папка на хостинге для превью ветки)
#
# Общие секреты: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Variables: FTP_DEPLOY_PROTOCOL=ftps, FTP_PORT
#
# Чтобы использовать другую ветку вместо develop — замените имя в on.push.branches
# и в проверке REF=develop ниже.

name: Deploy to Timeweb

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      full_reset:
        description: Полная перезаливка (удаляет содержимое целевого server-dir)
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-timeweb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Цель деплоя
        run: |
          echo "Ветка: ${GITHUB_REF_NAME}"
          echo "Коммит: ${GITHUB_SHA}"

      - name: Что уходит на сервер (проверка)
        run: |
          echo "Корень репозитория:"
          ls -la
          if [ -f index.html ]; then
            head -c 200 index.html | wc -c
            echo "байт из начала index.html"
          fi

      - name: Проверка секретов
        env:
          REF: ${{ github.ref_name }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
          FTP_SERVER_DIR_BRANCH: ${{ secrets.FTP_SERVER_DIR_BRANCH }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ] && missing="${missing} FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="${missing} FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="${missing} FTP_PASSWORD"
          if [ "$REF" = "main" ]; then
            [ -z "$FTP_SERVER_DIR" ] && missing="${missing} FTP_SERVER_DIR"
            TARGET_DIR="$FTP_SERVER_DIR"
          elif [ "$REF" = "develop" ]; then
            [ -z "$FTP_SERVER_DIR_BRANCH" ] && missing="${missing} FTP_SERVER_DIR_BRANCH"
            TARGET_DIR="$FTP_SERVER_DIR_BRANCH"
          else
            echo "::error::Деплой только для веток main и develop. Сейчас: $REF"
            exit 1
          fi
          if [ -n "$missing" ]; then
            echo "::error::Задайте секреты Actions:$missing"
            exit 1
          fi
          case "$TARGET_DIR" in
            */) ;;
            *)
              echo "::error::Путь на FTP должен заканчиваться на / (сейчас для $REF)"
              exit 1
              ;;
          esac

      - name: Каталог state для FTP-Deploy
        run: mkdir -p .deploy-state

      - name: Deploy по FTP
        if: ${{ vars.FTP_DEPLOY_PROTOCOL != 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ github.ref_name == 'main' && secrets.FTP_SERVER_DIR || secrets.FTP_SERVER_DIR_BRANCH }}
          port: ${{ vars.FTP_PORT || '21' }}
          state-name: .deploy-state/llmflor-${{ github.ref_name }}.json
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reset == true }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**

      - name: Deploy по FTPS
        if: ${{ vars.FTP_DEPLOY_PROTOCOL == 'ftps' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ github.ref_name == 'main' && secrets.FTP_SERVER_DIR || secrets.FTP_SERVER_DIR_BRANCH }}
          protocol: ftps
          security: loose
          port: ${{ vars.FTP_PORT || '21' }}
          state-name: .deploy-state/llmflor-${{ github.ref_name }}.json
          dangerous-clean-slate: ${{ github.event_name == 'workflow_dispatch' && inputs.full_reset == true }}
          log-level: standard
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
